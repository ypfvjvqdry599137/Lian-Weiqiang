<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鲜配居 - 管理后台</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入腾讯地图JS SDK (暂时注释，等申请到 Key 后取消注释) -->
    <!-- <script src="https://map.qq.com/api/gljs?v=1.exp&key=YOUR_TENCENT_MAP_KEY"></script> -->
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🍎 鲜配居管理后台</h1>
        </header>

        <nav class="sidebar">
            <ul class="menu">
                <li class="menu-item active" data-page="dashboard">首页概览</li>
                <li class="menu-item" data-page="suppliers">供应商管理</li>
                <li class="menu-item" data-page="ingredients">原料管理</li>
                <li class="menu-item" data-page="products">商品管理</li>
                <li class="menu-item" data-page="categories">分类管理</li>
                <li class="menu-item" data-page="delivery-zones">配送区域</li>
                <li class="menu-item" data-page="supplier-orders">供应商备货单</li>
                <li class="menu-item" data-page="orders">订单管理</li>
            </ul>
        </nav>

        <main class="content">
            <!-- 首页概览 -->
            <div id="page-dashboard" class="page active">
                <h2>📊 数据概览</h2>
                <div class="stats">
                    <div class="stat-card">
                        <h3>今日订单</h3>
                        <p id="stat-today-orders" class="number">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>今日成交</h3>
                        <p id="stat-today-revenue" class="number">¥0.00</p>
                    </div>
                    <div class="stat-card">
                        <h3>商品总数</h3>
                        <p id="stat-products" class="number">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>配送区域</h3>
                        <p id="stat-stations" class="number">0</p>
                    </div>
                </div>
            </div>

            <!-- 商品管理 -->
            <div id="page-products" class="page">
                <div class="page-header">
                    <h2>📦 商品管理</h2>
                    <button class="btn btn-primary" onclick="showProductModal()">+ 添加商品</button>
                </div>
                <div id="products-list" class="data-list"></div>
            </div>

            <!-- 分类管理 -->
            <div id="page-categories" class="page">
                <div class="page-header">
                    <h2>📁 分类管理</h2>
                    <button class="btn btn-primary" onclick="showCategoryModal()">+ 添加分类</button>
                </div>
                <div id="categories-list" class="data-list"></div>
            </div>

            <!-- 配送区域管理 -->
            <div id="page-delivery-zones" class="page">
                <div class="page-header">
                    <h2>📍 配送区域</h2>
                    <button class="btn btn-primary" onclick="showDeliveryZoneModal()">+ 添加配送区域</button>
                </div>
                <div id="delivery-zones-list" class="data-list"></div>
            </div>

            <!-- 供应商管理 -->
            <div id="page-suppliers" class="page">
                <div class="page-header">
                    <h2>🏭 供应商管理</h2>
                    <button class="btn btn-primary" onclick="showSupplierModal()">+ 添加供应商</button>
                </div>
                <div id="suppliers-list" class="data-list"></div>
            </div>

            <!-- 原料管理 -->
            <div id="page-ingredients" class="page">
                <div class="page-header">
                    <h2>🥬 原料管理</h2>
                    <button class="btn btn-primary" onclick="showIngredientModal()">+ 添加原料</button>
                </div>
                <div id="ingredients-list" class="data-list"></div>
            </div>

            <!-- 供应商备货单管理 -->
            <div id="page-supplier-orders" class="page">
                <h2>📋 供应商备货单</h2>
                <div class="tabs">
                    <button class="tab active" data-status="all">全部</button>
                    <button class="tab" data-status="10">待备货</button>
                    <button class="tab" data-status="20">备货中</button>
                    <button class="tab" data-status="30">已完成</button>
                </div>
                <div id="supplier-orders-list" class="data-list"></div>
            </div>

            <!-- 订单管理 -->
            <div id="page-orders" class="page">
                <h2>🛒 订单管理</h2>
                <div class="tabs">
                    <button class="tab active" data-status="all">全部</button>
                    <button class="tab" data-status="10">待付款</button>
                    <button class="tab" data-status="20">待配货</button>
                    <button class="tab" data-status="30">配送中</button>
                    <button class="tab" data-status="40">已送达</button>
                    <button class="tab" data-status="50">已完成</button>
                </div>
                <div id="orders-list" class="data-list"></div>
            </div>
        </main>
    </div>

    <!-- 商品编辑弹窗 -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('product-modal')">&times;</span>
            <h2 id="product-modal-title">添加商品</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label>商品名称</label>
                    <input type="text" id="product-name" required>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="product-desc"></textarea>
                </div>
                <div class="form-group">
                    <label>分类ID</label>
                    <input type="number" id="product-category-id">
                </div>
                <div class="form-group">
                    <label>价格</label>
                    <input type="number" step="0.01" id="product-price" required>
                </div>
                <div class="form-group">
                    <label>原价</label>
                    <input type="number" step="0.01" id="product-original-price">
                </div>
                <div class="form-group">
                    <label>图片URL</label>
                    <input type="url" id="product-image">
                </div>
                <div class="form-group">
                    <label>单位</label>
                    <input type="text" id="product-unit" placeholder="如：斤、个、盒">
                </div>
                <div class="form-group">
                    <label>库存</label>
                    <input type="number" id="product-stock" required>
                </div>
                <div class="form-group">
                    <label>库存预警阈值</label>
                    <input type="number" id="product-warning-stock" value="10">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="product-recommend">
                    <label>推荐商品</label>
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="product-active" checked>
                    <label>上架</label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 分类编辑弹窗 -->
    <div id="category-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('category-modal')">&times;</span>
            <h2 id="category-modal-title">添加分类</h2>
            <form id="category-form">
                <input type="hidden" id="category-id">
                <div class="form-group">
                    <label>分类名称</label>
                    <input type="text" id="category-name" required>
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <input type="text" id="category-icon" placeholder="如：🍎">
                </div>
                <div class="form-group">
                    <label>排序</label>
                    <input type="number" id="category-sort" value="0">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="category-active" checked>
                    <label>启用</label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 配送区域编辑弹窗 -->
    <div id="delivery-zone-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('delivery-zone-modal')">&times;</span>
            <h2 id="delivery-zone-modal-title">添加配送区域</h2>
            <form id="delivery-zone-form">
                <input type="hidden" id="delivery-zone-id">
                <div class="form-group">
                    <label>区域名称</label>
                    <input type="text" id="zone-name" required>
                </div>
                <div class="form-group">
                    <label>中心经度</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" step="0.000001" id="zone-center-lng" required style="flex:1;">
                        <button type="button" class="btn btn-primary" onclick="showMapPicker()" style="flex:0 0 auto;">📍 地图选择</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>中心纬度</label>
                    <input type="number" step="0.000001" id="zone-center-lat" required>
                </div>
                <div class="form-group">
                    <label>配送半径（米）</label>
                    <input type="number" id="zone-radius" value="3000" required>
                </div>
                <div class="form-group">
                    <label>配送费（元）</label>
                    <input type="number" step="0.01" id="zone-delivery-fee" value="5" required>
                </div>
                <div class="form-group">
                    <label>预计送达时间</label>
                    <input type="text" id="zone-delivery-time" value="30分钟" required>
                </div>
                <div class="form-group">
                    <label>合作商账号</label>
                    <input type="text" id="zone-merchant-user">
                </div>
                <div class="form-group">
                    <label>合作商密码</label>
                    <input type="password" id="zone-merchant-pwd">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="zone-active" checked>
                    <label>启用</label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 供应商编辑弹窗 -->
    <div id="supplier-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('supplier-modal')">&times;</span>
            <h2 id="supplier-modal-title">添加供应商</h2>
            <form id="supplier-form">
                <input type="hidden" id="supplier-id">
                <div class="form-group">
                    <label>供应商名称</label>
                    <input type="text" id="supplier-name" required>
                </div>
                <div class="form-group">
                    <label>联系人</label>
                    <input type="text" id="supplier-contact">
                </div>
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="text" id="supplier-phone">
                </div>
                <div class="form-group">
                    <label>登录账号</label>
                    <input type="text" id="supplier-username" required>
                </div>
                <div class="form-group">
                    <label>登录密码</label>
                    <input type="password" id="supplier-password" placeholder="留空则不修改">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="supplier-active" checked>
                    <label>启用</label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 原料编辑弹窗 -->
    <div id="ingredient-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('ingredient-modal')">&times;</span>
            <h2 id="ingredient-modal-title">添加原料</h2>
            <form id="ingredient-form">
                <input type="hidden" id="ingredient-id">
                <div class="form-group">
                    <label>原料名称</label>
                    <input type="text" id="ingredient-name" required>
                </div>
                <div class="form-group">
                    <label>单位</label>
                    <input type="text" id="ingredient-unit" value="斤" placeholder="如：斤、个、盒">
                </div>
                <div class="form-group">
                    <label>供应商</label>
                    <select id="ingredient-supplier-id" required></select>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="ingredient-category-id"></select>
                </div>
                <div class="form-group">
                    <label>价格（用于内部核算）</label>
                    <input type="number" step="0.01" id="ingredient-price">
                </div>
                <div class="form-group">
                    <label>库存</label>
                    <input type="number" id="ingredient-stock" value="0">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="ingredient-active" checked>
                    <label>启用</label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 商品原料配置弹窗 -->
    <div id="product-ingredients-modal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="close" onclick="closeModal('product-ingredients-modal')">&times;</span>
            <h2>配置成品原料</h2>
            <div id="product-ingredients-form">
                <input type="hidden" id="pi-product-id">
                <div class="form-group">
                    <label>选择原料</label>
                    <select id="pi-ingredient-id"></select>
                </div>
                <div class="form-group">
                    <label>所需数量</label>
                    <input type="number" step="0.01" id="pi-quantity" placeholder="每份成品所需原料量">
                </div>
                <button type="button" class="btn btn-primary" onclick="addProductIngredient()">+ 添加</button>
                <div style="margin-top: 20px;">
                    <h4>已配置原料</h4>
                    <div id="product-ingredients-list" class="data-list" style="margin-top: 10px;"></div>
                </div>
                <div style="margin-top: 20px;">
                    <button class="btn" onclick="closeModal('product-ingredients-modal')">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 地图选择弹窗 -->
    <div id="map-modal" class="modal">
        <div class="modal-content" style="max-width: 800px; width: 90%;">
            <span class="close" onclick="closeMapModal()">&times;</span>
            <h2>选择配送中心点</h2>
            <div id="map-container" style="width: 100%; height: 500px; margin: 20px 0;"></div>
            <p style="color: #666; margin-bottom: 20px;">点击地图选择配送中心点</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="confirmMapPick()">确认选择</button>
                <button class="btn" onclick="closeMapModal()">取消</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
